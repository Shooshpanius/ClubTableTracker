server 
{

	listen	80;

	server_name go40k.ru;
	resolver 8.8.8.8;

	client_max_body_size 40M;

	location / 
	{
		root   /usr/share/nginx/html;
		index  index.html index.htm;
		try_files $uri $uri/ /index.html;
		add_header Cross-Origin-Opener-Policy    "same-origin-allow-popups"                                                                             always;
		add_header X-Content-Type-Options        "nosniff"                                                                                              always;
		add_header X-Frame-Options               "DENY"                                                                                                 always;
		add_header Referrer-Policy               "strict-origin-when-cross-origin"                                                                      always;
		add_header Permissions-Policy            "geolocation=(), microphone=()"                                                                        always;
		add_header Strict-Transport-Security     "max-age=31536000; includeSubDomains"                                                                  always;
		add_header Content-Security-Policy       "default-src 'self'; script-src 'self' https://accounts.google.com https://mc.yandex.ru; style-src 'self' 'unsafe-inline'; frame-src https://accounts.google.com https://mc.yandex.ru; img-src 'self' data: https://mc.yandex.ru https://lh3.googleusercontent.com; connect-src 'self' https://mc.yandex.ru wss://mc.yandex.ru;" always;
	}


	location /api 
	{
		proxy_pass         http://back40club:8080;
		proxy_http_version 1.1;
		proxy_set_header   Connection        "";
		proxy_set_header   Host              $host;
		proxy_set_header   X-Real-IP         $remote_addr;
		proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
		proxy_set_header   X-Forwarded-Proto $scheme;
	}

	location /uploads
	{
		proxy_pass         http://back40club:8080;
		proxy_http_version 1.1;
		proxy_set_header   Connection        "";
		proxy_set_header   Host              $host;
		proxy_set_header   X-Real-IP         $remote_addr;
		proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
		proxy_set_header   X-Forwarded-Proto $scheme;
	}




}
