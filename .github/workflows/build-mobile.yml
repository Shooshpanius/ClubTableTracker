name: Сборка мобильного приложения

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'MobileFlutter/**'

jobs:
  android:
    name: Android (APK)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Получение кода
        uses: actions/checkout@v4

      - name: Установка Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Установка Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Установка зависимостей
        working-directory: MobileFlutter
        run: flutter pub get

      - name: Сборка APK
        working-directory: MobileFlutter
        run: flutter build apk --release

      - name: Загрузка APK как артефакта
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: MobileFlutter/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
