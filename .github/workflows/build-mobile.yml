name: Сборка мобильного приложения

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'MobileFlutter/**'

jobs:
  android:
    name: Android (APK)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Получение кода
        uses: actions/checkout@v4

      - name: Установка Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Установка Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Извлечение данных из CLIENT_SECRET_WEB
        env:
          CLIENT_SECRET_WEB: ${{ secrets.CLIENT_SECRET_WEB }}
        run: |
          if [ -z "${CLIENT_SECRET_WEB}" ]; then
            echo "::error::Секрет CLIENT_SECRET_WEB не задан. Добавьте содержимое файла client_secret_*.json в Settings → Secrets → Actions."
            exit 1
          fi
          GOOGLE_CLIENT_ID=$(echo "${CLIENT_SECRET_WEB}" | jq -r '.web.client_id // empty')
          GS_PROJECT_ID=$(echo "${CLIENT_SECRET_WEB}" | jq -r '.web.project_id // empty')
          if [ -z "${GOOGLE_CLIENT_ID}" ]; then
            echo "::error::Не удалось извлечь web.client_id из CLIENT_SECRET_WEB. Убедитесь, что файл содержит объект .web."
            exit 1
          fi
          if [ -z "${GS_PROJECT_ID}" ]; then
            echo "::error::Не удалось извлечь web.project_id из CLIENT_SECRET_WEB. Убедитесь, что файл содержит объект .web."
            exit 1
          fi
          echo "GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}" >> "$GITHUB_ENV"
          echo "GS_PROJECT_ID=${GS_PROJECT_ID}" >> "$GITHUB_ENV"

      - name: Подстановка Google Client ID
        run: |
          # GOOGLE_CLIENT_ID должен содержать полный ID вида
          # 1234567890-abcdef.apps.googleusercontent.com
          # Короткая часть (до .apps.googleusercontent.com) используется как OAuth-схема
          SHORT_ID="${GOOGLE_CLIENT_ID%.apps.googleusercontent.com}"
          sed -i "s/YOUR_CLIENT_ID/${SHORT_ID}/g" \
            MobileFlutter/android/app/src/main/AndroidManifest.xml
          sed -i "s/YOUR_CLIENT_ID/${SHORT_ID}/g" \
            MobileFlutter/ios/Runner/Info.plist
          sed -i "s/YOUR_GOOGLE_CLIENT_ID\.apps\.googleusercontent\.com/${GOOGLE_CLIENT_ID}/g" \
            MobileFlutter/ios/Runner/Info.plist
          # serverClientId для GoogleSignIn в Flutter-коде (нужен Web Client ID)
          sed -i "s/YOUR_GOOGLE_SERVER_CLIENT_ID/${GOOGLE_CLIENT_ID}/g" \
            MobileFlutter/lib/constants.dart

      - name: Инъекция google-services.json
        env:
          GS_PROJECT_NUMBER: ${{ secrets.GS_PROJECT_NUMBER }}
          GS_APP_ID: ${{ secrets.GS_APP_ID }}
          GS_ANDROID_CLIENT_ID: ${{ secrets.GS_ANDROID_CLIENT_ID }}
          GS_SHA1_CERT_HASH: ${{ secrets.GS_SHA1_CERT_HASH }}
          GS_ANDROID_API_KEY: ${{ secrets.GS_ANDROID_API_KEY }}
        run: |
          for var in GS_PROJECT_NUMBER GS_PROJECT_ID GS_APP_ID GS_ANDROID_CLIENT_ID GS_SHA1_CERT_HASH GS_ANDROID_API_KEY GOOGLE_CLIENT_ID; do
            if [ -z "${!var}" ]; then
              echo "::error::Секрет $var не задан. Добавьте его в Settings → Secrets → Actions."
              exit 1
            fi
          done

          GOOGLE_SERVICES_JSON=$(jq -n \
            --arg project_number  "$GS_PROJECT_NUMBER" \
            --arg project_id      "$GS_PROJECT_ID" \
            --arg app_id          "$GS_APP_ID" \
            --arg android_client  "$GS_ANDROID_CLIENT_ID" \
            --arg sha1_hash       "$GS_SHA1_CERT_HASH" \
            --arg web_client      "$GOOGLE_CLIENT_ID" \
            --arg api_key         "$GS_ANDROID_API_KEY" \
            '{
              "project_info": {
                "project_number": $project_number,
                "project_id": $project_id,
                "storage_bucket": "\($project_id).appspot.com"
              },
              "client": [
                {
                  "client_info": {
                    "mobilesdk_app_id": "1:\($project_number):android:\($app_id)",
                    "android_client_info": {
                      "package_name": "com.example.club_table_tracker"
                    }
                  },
                  "oauth_client": [
                    {
                      "client_id": $android_client,
                      "client_type": 1,
                      "android_info": {
                        "package_name": "com.example.club_table_tracker",
                        "certificate_hash": $sha1_hash
                      }
                    },
                    {
                      "client_id": $web_client,
                      "client_type": 3
                    }
                  ],
                  "api_key": [
                    {
                      "current_key": $api_key
                    }
                  ],
                  "services": {
                    "appinvite_service": {
                      "other_platform_oauth_client": [
                        {
                          "client_id": $web_client,
                          "client_type": 3
                        }
                      ]
                    }
                  }
                }
              ],
              "configuration_version": "1"
            }')

          echo "$GOOGLE_SERVICES_JSON" > MobileFlutter/android/app/google-services.json

      - name: Установка зависимостей
        working-directory: MobileFlutter
        run: flutter pub get

      - name: Сборка APK
        working-directory: MobileFlutter
        run: flutter build apk --release

      - name: Загрузка APK как артефакта
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: MobileFlutter/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
