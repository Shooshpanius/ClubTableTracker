name: Сборка мобильного приложения

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'MobileFlutter/**'
      - 'clubtabletracker.client/src/version.ts'

jobs:
  android:
    name: Android (APK)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Получение кода
        uses: actions/checkout@v4

      - name: Синхронизация версии из браузерной части
        run: |
          VERSION_FILE="clubtabletracker.client/src/version.ts"
          PR_NUMBER=$(grep 'LAST_PR_NUMBER' "${VERSION_FILE}" | grep -o '[0-9]*' | head -1)
          PR_DATE=$(grep 'LAST_PR_DATE' "${VERSION_FILE}" | sed "s/.*'\([^']*\)'.*/\1/")
          PR_DATE="${PR_DATE:-неизвестна}"
          if [ -z "${PR_NUMBER}" ] || [ "${PR_NUMBER}" = "0" ]; then
            echo "::warning::Не удалось извлечь LAST_PR_NUMBER из version.ts, версия pubspec.yaml не изменена."
          else
            FLUTTER_VERSION="1.0.${PR_NUMBER}+${PR_NUMBER}"
            sed -i "s/^version: .*/version: ${FLUTTER_VERSION}/" MobileFlutter/pubspec.yaml
            echo "::notice::Flutter версия установлена: ${FLUTTER_VERSION} (PR #${PR_NUMBER} от ${PR_DATE})"
          fi

      - name: Установка Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Установка Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Извлечение данных из CLIENT_SECRET_WEB
        env:
          CLIENT_SECRET_WEB: ${{ secrets.CLIENT_SECRET_WEB }}
        run: |
          if [ -z "${CLIENT_SECRET_WEB}" ]; then
            echo "::error::Секрет CLIENT_SECRET_WEB не задан. Добавьте содержимое файла client_secret_*.json в Settings → Secrets → Actions."
            exit 1
          fi
          # Проверяем, что секрет содержит валидный JSON, прежде чем передавать его в jq.
          # Без этой проверки jq завершается с кодом 5 (parse error) и bash (-eo pipefail)
          # прерывает шаг без понятного сообщения об ошибке.
          # Используем here-string вместо echo | чтобы не засвечивать значение в списке процессов.
          if ! jq empty <<< "${CLIENT_SECRET_WEB}" > /dev/null 2>&1; then
            echo "::error::Секрет CLIENT_SECRET_WEB содержит невалидный JSON. Убедитесь, что в секрет вставлено содержимое файла client_secret_*.json целиком (не base64, не путь к файлу и не SHA-1)."
            exit 1
          fi
          # Поддерживаем оба формата: Web OAuth (.web) и Android/Desktop OAuth (.installed)
          GOOGLE_CLIENT_ID=$(echo "${CLIENT_SECRET_WEB}" | jq -r '(.web // .installed).client_id // empty')
          if [ -z "${GOOGLE_CLIENT_ID}" ]; then
            echo "::error::Не удалось извлечь client_id из CLIENT_SECRET_WEB. Убедитесь, что файл содержит объект .web или .installed."
            exit 1
          fi
          echo "GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}" >> "$GITHUB_ENV"

      - name: Подстановка Google Client ID
        run: |
          # GOOGLE_CLIENT_ID должен содержать полный ID вида
          # 1234567890-abcdef.apps.googleusercontent.com
          # Короткая часть (до .apps.googleusercontent.com) используется как OAuth-схема
          SHORT_ID="${GOOGLE_CLIENT_ID%.apps.googleusercontent.com}"
          sed -i "s/YOUR_CLIENT_ID/${SHORT_ID}/g" \
            MobileFlutter/android/app/src/main/AndroidManifest.xml
          sed -i "s/YOUR_CLIENT_ID/${SHORT_ID}/g" \
            MobileFlutter/ios/Runner/Info.plist
          sed -i "s/YOUR_GOOGLE_CLIENT_ID\.apps\.googleusercontent\.com/${GOOGLE_CLIENT_ID}/g" \
            MobileFlutter/ios/Runner/Info.plist
          # serverClientId для GoogleSignIn в Flutter-коде (нужен Web Client ID)
          sed -i "s/YOUR_GOOGLE_SERVER_CLIENT_ID/${GOOGLE_CLIENT_ID}/g" \
            MobileFlutter/lib/constants.dart

      - name: Инъекция google-services.json
        env:
          CLIENT_SECRET_WEB: ${{ secrets.CLIENT_SECRET_WEB }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          ANDROID_CLIENT_ID: ${{ secrets.ANDROID_CLIENT_ID }}
          ANDROID_SHA1: ${{ secrets.ANDROID_SHA1 }}
        run: |
          if [ -z "${GOOGLE_CLIENT_ID}" ]; then
            echo "::error::GOOGLE_CLIENT_ID не задан — проверьте секрет CLIENT_SECRET_WEB."
            exit 1
          fi
          # Если GOOGLE_SERVICES_JSON уже содержит корректный Android-формат (есть project_info),
          # используем его напрямую. Иначе — конструируем из CLIENT_SECRET_WEB.
          if echo "${GOOGLE_SERVICES_JSON}" | jq -e '.project_info' > /dev/null 2>&1; then
            echo "${GOOGLE_SERVICES_JSON}" > MobileFlutter/android/app/google-services.json
          else
            PROJECT_ID=$(echo "${CLIENT_SECRET_WEB}" | jq -r '(.web // .installed).project_id')
            WEB_CLIENT_ID=$(echo "${CLIENT_SECRET_WEB}" | jq -r '(.web // .installed).client_id')
            # Google OAuth client_id имеет формат <project_number>-<hash>.apps.googleusercontent.com,
            # поэтому project_number — числовая часть до первого дефиса.
            PROJECT_NUMBER="${WEB_CLIENT_ID%%-*}"
            if [ -z "${PROJECT_ID}" ] || [ -z "${WEB_CLIENT_ID}" ] || [ -z "${PROJECT_NUMBER}" ]; then
              echo "::error::Не удалось извлечь project_id / client_id из CLIENT_SECRET_WEB."
              exit 1
            fi
            if ! [[ "${PROJECT_NUMBER}" =~ ^[0-9]+$ ]]; then
              echo "::error::Не удалось извлечь числовой project_number из client_id '${WEB_CLIENT_ID}'."
              exit 1
            fi
            # package_name соответствует applicationId в MobileFlutter/android/app/build.gradle
            APP_PACKAGE="com.example.club_table_tracker"
            # mobilesdk_app_id нужен плагину google-services; приложение использует только
            # google_sign_in (без Firebase SDK), поэтому hex-суффикс не влияет на функционал.
            if [ -n "${ANDROID_CLIENT_ID}" ] && [ -n "${ANDROID_SHA1}" ]; then
              # Android OAuth клиент (client_type=1) с SHA-1 обязателен для Google Sign-In на Android.
              # Без него Google Play Services возвращает DEVELOPER_ERROR (code 10).
              # certificate_hash в google-services.json должен быть в нижнем регистре без двоеточий —
              # именно в таком формате его ожидает плагин com.google.gms.google-services при сборке.
              SHA1_CLEAN=$(echo "${ANDROID_SHA1}" | tr -d ':' | tr '[:upper:]' '[:lower:]')
              jq -n \
                --arg project_number "${PROJECT_NUMBER}" \
                --arg project_id "${PROJECT_ID}" \
                --arg web_client_id "${WEB_CLIENT_ID}" \
                --arg android_client_id "${ANDROID_CLIENT_ID}" \
                --arg sha1 "${SHA1_CLEAN}" \
                --arg package_name "${APP_PACKAGE}" \
                '{
                  "project_info": {
                    "project_number": $project_number,
                    "project_id": $project_id,
                    "storage_bucket": ($project_id + ".appspot.com")
                  },
                  "client": [{
                    "client_info": {
                      "mobilesdk_app_id": ("1:" + $project_number + ":android:0000000000000000"),
                      "android_client_info": {
                        "package_name": $package_name
                      }
                    },
                    "oauth_client": [
                      {
                        "client_id": $android_client_id,
                        "client_type": 1,
                        "android_info": {
                          "package_name": $package_name,
                          "certificate_hash": $sha1
                        }
                      },
                      {
                        "client_id": $web_client_id,
                        "client_type": 3
                      }
                    ],
                    "api_key": [{"current_key": ""}],
                    "services": {}
                  }],
                  "configuration_version": "1"
                }' > MobileFlutter/android/app/google-services.json
            else
              echo "::warning::Секреты ANDROID_CLIENT_ID и ANDROID_SHA1 не заданы. Google Sign-In на Android будет выдавать ошибку DEVELOPER_ERROR (code 10). Добавьте оба секрета для включения Google Sign-In."
              jq -n \
                --arg project_number "${PROJECT_NUMBER}" \
                --arg project_id "${PROJECT_ID}" \
                --arg web_client_id "${WEB_CLIENT_ID}" \
                --arg package_name "${APP_PACKAGE}" \
                '{
                  "project_info": {
                    "project_number": $project_number,
                    "project_id": $project_id,
                    "storage_bucket": ($project_id + ".appspot.com")
                  },
                  "client": [{
                    "client_info": {
                      "mobilesdk_app_id": ("1:" + $project_number + ":android:0000000000000000"),
                      "android_client_info": {
                        "package_name": $package_name
                      }
                    },
                    "oauth_client": [{
                      "client_id": $web_client_id,
                      "client_type": 3
                    }],
                    "api_key": [{"current_key": ""}],
                    "services": {}
                  }],
                  "configuration_version": "1"
                }' > MobileFlutter/android/app/google-services.json
            fi
          fi

      - name: Диагностика google-services.json
        run: |
          GSJ="MobileFlutter/android/app/google-services.json"
          if [ ! -f "${GSJ}" ]; then
            echo "::error::google-services.json не найден после инъекции!"
            exit 1
          fi
          echo "::notice::Структура google-services.json:"
          echo "  project_id   = $(jq -r '.project_info.project_id' "${GSJ}")"
          ANDROID_CLIENTS=$(jq '[.client[].oauth_client[] | select(.client_type == 1)] | length' "${GSJ}")
          WEB_CLIENTS=$(jq '[.client[].oauth_client[] | select(.client_type == 3)] | length' "${GSJ}")
          echo "  android oauth clients (type=1): ${ANDROID_CLIENTS}"
          echo "  web oauth clients    (type=3): ${WEB_CLIENTS}"
          if [ "${ANDROID_CLIENTS}" -lt 1 ]; then
            echo "::error::В google-services.json нет Android OAuth client (client_type=1). Google Sign-In будет выдавать DEVELOPER_ERROR (code 10). Задайте секреты ANDROID_CLIENT_ID и ANDROID_SHA1."
            exit 1
          fi
          CERT_HASH=$(jq -r '.client[].oauth_client[] | select(.client_type == 1) | .android_info.certificate_hash' "${GSJ}")
          echo "  certificate_hash (нормализованный): ${CERT_HASH}"
          # Проверяем подстановку serverClientId в constants.dart
          SERVER_ID=$(grep 'googleServerClientId' MobileFlutter/lib/constants.dart | head -1)
          if echo "${SERVER_ID}" | grep -q 'YOUR_GOOGLE_SERVER_CLIENT_ID'; then
            echo "::error::В constants.dart не был подставлен serverClientId — строка содержит YOUR_GOOGLE_SERVER_CLIENT_ID. Проверьте шаг 'Подстановка Google Client ID'."
            exit 1
          fi
          echo "  constants.dart serverClientId подставлен: OK"

      - name: Подготовка debug keystore
        env:
          ANDROID_FILE: ${{ secrets.ANDROID_FILE }}
        run: |
          mkdir -p ~/.android /tmp/keystore-export
          KEYSTORE_PATH=~/.android/debug.keystore

          if [ -n "${ANDROID_FILE}" ]; then
            # Пробуем восстановить keystore из секрета ANDROID_FILE.
            # Важно: декодируем сразу в файл, а не в переменную — command substitution
            # ($(...)) обрезает null-байты в бинарном JKS-файле и делает его невалидным.
            TMPKS=$(mktemp)
            chmod 600 "${TMPKS}"
            echo "${ANDROID_FILE}" | base64 -d > "${TMPKS}" 2>/dev/null || true
            # Пробуем JKS (исторический формат debug.keystore)
            if keytool -list -keystore "${TMPKS}" -storepass android -storetype JKS > /dev/null 2>&1; then
              cp "${TMPKS}" "${KEYSTORE_PATH}"
              shred -u "${TMPKS}" 2>/dev/null || rm -f "${TMPKS}"
              echo "::notice::Keystore успешно восстановлен из секрета ANDROID_FILE (JKS)."
            # Пробуем PKCS12 (формат, который генерирует keytool в Java 17+)
            elif keytool -list -keystore "${TMPKS}" -storepass android -storetype PKCS12 > /dev/null 2>&1; then
              cp "${TMPKS}" "${KEYSTORE_PATH}"
              shred -u "${TMPKS}" 2>/dev/null || rm -f "${TMPKS}"
              echo "::notice::Keystore успешно восстановлен из секрета ANDROID_FILE (PKCS12)."
            else
              shred -u "${TMPKS}" 2>/dev/null || rm -f "${TMPKS}"
              echo "::error::Секрет ANDROID_FILE задан, но содержит невалидный keystore (не JKS и не PKCS12). Возможные причины: вставлен не файл keystore.b64 целиком, а SHA-1 или путь к файлу; при копировании появились лишние символы или переносы строк; файл повреждён при передаче. Скачайте заново артефакт 'debug-keystore' из прогона, где был сгенерирован ключ, и вставьте содержимое keystore.b64 в секрет без изменений."
              exit 1
            fi
          else
            # ANDROID_FILE не задан — генерируем новый keystore однократно,
            # экспортируем как артефакт и прерываем сборку с инструкцией.
            # Это намеренно: без фиксированного keystore каждая сборка даст новый SHA-1,
            # и Google Sign-In будет возвращать DEVELOPER_ERROR (код 10).
            keytool -genkeypair -v \
              -keystore "${KEYSTORE_PATH}" \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -storepass android \
              -keypass android \
              -storetype JKS \
              -dname "CN=Android Debug,O=Android,C=US"
            # Используем -v (verbose), чтобы получить полный отпечаток — без флага -v
            # строка "SHA1:" может отсутствовать в некоторых версиях Java.
            NEW_SHA1=$(keytool -list -v -keystore "${KEYSTORE_PATH}" -alias androiddebugkey -storepass android 2>/dev/null | grep -i "SHA1:" | head -1 | awk -F': ' '{print $2}' | tr -d ' \r')
            # Добавляем пробел после каждой пары символов, чтобы GitHub не замаскировал значение
            # (маскировка работает по точному совпадению строки без пробелов).
            NEW_SHA1_DISPLAY=$(echo "${NEW_SHA1}" | sed 's/\(..\)/\1 /g' | sed 's/ $//')
            base64 -w 0 "${KEYSTORE_PATH}" > /tmp/keystore-export/keystore.b64
            echo "::error::Секрет ANDROID_FILE не задан. Keystore сгенерирован — SHA-1: ${NEW_SHA1_DISPLAY}"
            echo "::error::Чтобы зафиксировать подпись: 1) Скачайте артефакт 'debug-keystore' из этого прогона. 2) Содержимое keystore.b64 целиком вставьте в Settings → Secrets → Actions → ANDROID_FILE. 3) SHA-1 выше вставьте в секрет ANDROID_SHA1. 4) Зарегистрируйте SHA-1 в Google Cloud Console → Credentials → Android OAuth Client (пакет com.example.club_table_tracker). 5) Запустите сборку снова."
            exit 1
          fi

          # Экспортируем используемый keystore как артефакт (удобно для резервной копии).
          base64 -w 0 "${KEYSTORE_PATH}" > /tmp/keystore-export/keystore.b64

      - name: Вывод SHA-1 используемого keystore
        run: |
          SHA1=$(keytool -list -v -keystore ~/.android/debug.keystore -alias androiddebugkey -storepass android 2>/dev/null | grep -i "SHA1:" | head -1 | awk -F': ' '{print $2}' | tr -d ' \r')
          # Добавляем пробел после каждой пары символов, чтобы GitHub не замаскировал значение
          # как секрет (маскировка работает по точному совпадению строки).
          SHA1_DISPLAY=$(echo "${SHA1}" | sed 's/\(..\)/\1 /g' | sed 's/ $//')
          echo "::notice::SHA-1 keystore'а, которым подписан APK: ${SHA1_DISPLAY}"
          echo "Зарегистрируйте этот SHA-1 в Google Cloud Console → Credentials → Android OAuth Client для пакета com.example.club_table_tracker"

      - name: Сохранение keystore как артефакта
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-keystore
          path: /tmp/keystore-export/keystore.b64
          retention-days: 7
          if-no-files-found: ignore

      - name: Установка зависимостей
        working-directory: MobileFlutter
        run: flutter pub get

      - name: Сборка APK
        working-directory: MobileFlutter
        run: flutter build apk --release

      - name: Загрузка APK как артефакта
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: MobileFlutter/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
