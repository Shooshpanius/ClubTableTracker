name: Manual and Auto Deploy

on:
  workflow_dispatch: # Позволяет запускать вручную из вкладки Actions

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:

      - name: Check secrets visibility
        run: |
          echo "Host is set: ${{ secrets.SERVER_HOST != '' }}"
          echo "User is set: ${{ secrets.SERVER_USER != '' }}"
          echo "Key is set: ${{ secrets.SERVER_SSH_KEY != '' }}"
          echo "Key length: ${#SSH_KEY}"
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
    
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/docker/images/go40k.ru
            echo "${{ secrets.SERVER_PASSWORD }}" | sudo -S ./__BuildAll.sh
            cd /opt/docker/composer         
            echo "${{ secrets.SERVER_PASSWORD }}" | sudo -S ./_40_CLUB_REBASE.sh

            
