name: club_table_tracker
description: Mobile app for Club Table Tracker - table booking system for wargaming clubs.
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP запросы
  http: ^1.2.1

  # Локальное хранилище (JWT токен, настройки)
  shared_preferences: ^2.3.1

  # Google Sign-In
  google_sign_in: ^6.2.1

  # Форматирование дат
  intl: ^0.19.0

  # Кеширование сетевых изображений
  cached_network_image: ^3.4.0

  # Открытие URL в браузере / файловом просмотрщике
  url_launcher: ^6.3.0

  # Firebase (push-уведомления)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.0

  # Иконки
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
