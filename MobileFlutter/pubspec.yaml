name: club_table_tracker
description: Mobile app for Club Table Tracker – бронирование игровых столов для варгеймерских клубов.
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP запросы
  http: ^1.2.1

  # Локальное хранилище (JWT токен, настройки)
  shared_preferences: ^2.3.1

  # Google Sign-In
  google_sign_in: ^6.2.1

  # Форматирование дат
  intl: ^0.19.0

  # Кеширование сетевых изображений
  cached_network_image: ^3.4.0

  # Иконки
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
