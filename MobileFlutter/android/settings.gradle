pluginManagement {
    def flutterSdkPath = {
        def localPropertiesFile = file("local.properties")
        assert localPropertiesFile.exists(), \
            "local.properties not found. Run 'flutter pub get' or set up your Flutter SDK."
        def properties = new Properties()
        localPropertiesFile.withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, \
            "flutter.sdk not set in local.properties. Run 'flutter pub get' or set flutter.sdk manually."
        return flutterSdkPath
    }()
    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.1.0" apply false
    id "org.jetbrains.kotlin.android" version "1.9.22" apply false
}

include ":app"
