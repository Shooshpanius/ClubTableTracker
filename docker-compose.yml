services:
  front40club:
    build:
      context: ./clubtabletracker.client
      args:
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
    container_name: front40club
    ports:
      - "80:80"
    depends_on:
      - back40club
    networks:
      - clubnet

  back40club:
    build:
      context: ./ClubTableTracker.Server
    container_name: back40club
    environment:
      - Google__ClientId=${VITE_GOOGLE_CLIENT_ID}
      - Jwt__Secret=${JWT_SECRET}
      - MasterKey=${MASTER_KEY}
      - ConnectionStrings__Default=Server=db;Database=clubtracker;User=${DB_USER};Password=${DB_PASSWORD};
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - clubnet

  db:
    image: mysql:8
    container_name: db
    environment:
      - MYSQL_DATABASE=clubtracker
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USER}", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clubnet

networks:
  clubnet:
    driver: bridge

volumes:
  db_data:
