services:


#########################################################################################################################################
#       Application CLUB
#########################################################################################################################################


  back40club:
    container_name: back40club
    image: back40club:local
    restart: always
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Server=mariadb40club;Port=3306;Database=clubtracker;User=${DB_USER};Password=${DB_PASSWORD};
      Google__ClientId: ${VITE_GOOGLE_CLIENT_ID}
      Yandex__ClientId: ${YANDEX_CLIENT_ID:-}
      Yandex__ClientSecret: ${YANDEX_CLIENT_SECRET:-}
      Vk__ClientId: ${VK_CLIENT_ID:-}
      Vk__ClientSecret: ${VK_CLIENT_SECRET:-}
      Jwt__Secret: ${JWT_SECRET}
      MasterKey: ${MASTER_KEY}
      Firebase__ServiceAccountJson: ${Firebase__ServiceAccountJson}
    volumes:
      - /opt/docker/data/_wh40k_club/club_uploads:/app/uploads
    depends_on:
      mariadb40club:
        condition: service_healthy


  front40club:
  container_name: front40club
  image: front40club:local
  environment:
    VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
    VITE_YANDEX_CLIENT_ID: ${YANDEX_CLIENT_ID:-}
    VITE_VK_CLIENT_ID: ${VK_CLIENT_ID:-}
    YANDEX_METRIKA_ID: ${YANDEX_METRIKA_ID:-0}
    ports:
      - "85:80"
    restart: always
    depends_on:
      - back40club


  mariadb40club:
    container_name: mariadb40club
    image: mariadb:lts
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: clubtracker
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - /opt/docker/data/_wh40k_club/mariadb40club:/var/lib/mysql
    restart: always
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 3




